name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel in-flight CI for the same branch on new push.
# PRs and non-main branches are cancelled; main always runs to completion.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  # ─── Fast signal — runs on every push/PR ──────────────────────────────────
  # Lint, format, typecheck, tests + coverage, build, bundle-size budget.
  # Single Node version from .nvmrc to keep this lane fast (~45s).
  lint-test-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm typecheck

      - name: Unit tests + coverage
        run: pnpm -r test:coverage

      - name: Build
        run: pnpm build

      - name: Bundle size budget
        run: |
          ADMIN_BYTES=$(gzip -c packages/plugin/dist/client.js | wc -c)
          echo "admin chunk: $ADMIN_BYTES bytes (gzip)"
          if [ "$ADMIN_BYTES" -gt 81920 ]; then
            echo "::error::admin chunk over 80kB gzip budget"; exit 1
          fi

  # ─── Node version matrix — env-dependent runtime checks ───────────────────
  # Skips lint/format/bundle-budget (env-independent, covered above) and runs
  # only the bits that can vary by Node version: typecheck, tests, build.
  node-matrix:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['20', '22']
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Type check
        run: pnpm typecheck
      - name: Unit tests
        run: pnpm -r test
      - name: Build
        run: pnpm build

  # ─── End-to-end smoke + a11y + Phase-3 + Phase-5 gates ───────────────────
  # Boots examples/basic against SQLite, runs the full Playwright suite.
  # Slow (~3 min) but guards the contract end-to-end.
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Install Playwright browsers
        # `--with-deps` triggers an interactive apt-get on newer runner images
        # which hangs the job. ubuntu-latest already has the required system
        # libs preinstalled, so we skip --with-deps.
        run: pnpm exec playwright install chromium
        timeout-minutes: 5
      - name: Build plugin
        run: pnpm build
      - name: Run e2e suite
        run: pnpm test:e2e
        timeout-minutes: 8
        env:
          CI: 'true'
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 7
